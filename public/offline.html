<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline — The Equiano Way</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --teal:        #1A6B5F;
  --teal-dark:   #0F3F37;
  --teal-light:  #E8F4F2;
  --gold:        #C49A2E;
  --gold-light:  #F5E6C0;
  --parchment:   #F2EDE3;
  --ink:         #1C1813;
  --ink-light:   #3D3428;
  --stone-light: #A89F90;

  --font-display: 'Cinzel', serif;
  --font-body:    'Cormorant Garamond', serif;
  --font-reading: 'Crimson Pro', serif;
}

html, body {
  height: 100%;
}

body {
  font-family: var(--font-body);
  background: var(--parchment);
  color: var(--ink);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  text-align: center;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: -1;
  opacity: 0.6;
}

.offline-icon {
  width: 64px;
  height: 64px;
  margin-bottom: 2rem;
  color: var(--teal);
  opacity: 0.6;
}

.offline-title {
  font-family: var(--font-display);
  font-size: clamp(1.5rem, 4vw, 2.2rem);
  font-weight: 400;
  letter-spacing: 0.05em;
  color: var(--ink);
  margin-bottom: 1.25rem;
}

.offline-message {
  font-family: var(--font-body);
  font-size: 1.15rem;
  font-weight: 300;
  line-height: 1.8;
  color: var(--ink-light);
  max-width: 460px;
  margin-bottom: 2.5rem;
}

.btn-map {
  display: inline-flex;
  align-items: center;
  gap: 0.75rem;
  font-family: var(--font-display);
  font-size: 0.75rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--ink);
  background: var(--gold);
  border: none;
  padding: 1.1rem 2.5rem;
  cursor: pointer;
  text-decoration: none;
  position: relative;
  overflow: hidden;
  transition: background 0.3s, transform 0.2s;
  min-height: 44px;
}

.btn-map::before {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0.15);
  transform: translateX(-100%);
  transition: transform 0.4s ease;
}

.btn-map:hover::before { transform: translateX(0); }
.btn-map:hover { transform: translateY(-1px); }
.btn-map:focus-visible { outline: 3px solid var(--gold-light); outline-offset: 3px; }

.offline-note {
  margin-top: 1.5rem;
  font-family: var(--font-reading);
  font-size: 0.8rem;
  letter-spacing: 0.15em;
  color: var(--stone-light);
}
</style>
</head>
<body>

<svg class="offline-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
  <path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.56 9M1.42 9a16 16 0 0 1 5.06-2.68M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>

<h1 class="offline-title">You're Offline</h1>

<p class="offline-message">The map and route content are still available. Return to the map to continue your walk with cached data.</p>

<a href="map.html" class="btn-map" aria-label="Return to the map">
  Back to Map
  <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
    <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
</a>

<p class="offline-note">Cached content available offline</p>

</body>
</html>
