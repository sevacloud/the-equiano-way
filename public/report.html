<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Report — The Equiano Way</title>
<link rel="manifest" href="/manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --teal:        #1A6B5F;
  --teal-dark:   #0F3F37;
  --teal-light:  #E8F4F2;
  --gold:        #C49A2E;
  --gold-dark:   #7A5C0A;
  --gold-light:  #F5E6C0;
  --parchment:   #F2EDE3;
  --parchment-2: #E8E0D0;
  --ink:         #1C1813;
  --ink-light:   #3D3428;
  --stone:       #7A7060;
  --stone-light: #A89F90;
  --white:       #FFFFFF;
  --font-display: 'Cinzel', serif;
  --font-body:    'Cormorant Garamond', serif;
  --font-reading: 'Crimson Pro', serif;
}

html { scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  background: var(--parchment);
  color: var(--ink);
  min-height: 100vh;
}

/* Top bar */
.top-bar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  height: 56px; padding: 0 1.25rem;
  background: rgba(15,39,35,0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(196,154,46,0.2);
}

.top-bar-left { display: flex; align-items: center; gap: 0.75rem; }

.btn-back {
  display: flex; align-items: center; justify-content: center;
  width: 44px; height: 44px;
  background: none; border: none; cursor: pointer;
  color: var(--parchment); text-decoration: none;
}
.btn-back:hover { background: rgba(242,237,227,0.1); }
.btn-back:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

.top-wordmark {
  font-family: var(--font-display);
  font-size: 0.65rem; letter-spacing: 0.25em;
  text-transform: uppercase; color: var(--parchment); opacity: 0.8;
}

/* Page content */
.page-content {
  max-width: 640px; margin: 0 auto;
  padding: 2rem 1.25rem 4rem;
}

.page-heading {
  font-family: var(--font-display);
  font-size: clamp(1.4rem, 3vw, 2rem);
  font-weight: 400; color: var(--ink);
  letter-spacing: 0.04em; margin-bottom: 0.5rem;
}

.page-sub {
  font-family: var(--font-body);
  font-size: 1rem; font-style: italic; font-weight: 300;
  color: var(--stone); margin-bottom: 2rem;
}

/* Tabs */
.tabs {
  display: flex; border-bottom: 1px solid var(--parchment-2);
  margin-bottom: 2rem; gap: 0;
}

.tab-btn {
  flex: 1; min-height: 48px; padding: 0.75rem 1rem;
  font-family: var(--font-reading); font-size: 0.8rem;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--stone); background: none; border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer; transition: color 0.2s, border-color 0.2s;
}
.tab-btn:hover { color: var(--teal); }
.tab-btn:focus-visible { outline: 2px solid var(--gold); outline-offset: -2px; }
.tab-btn.active { color: var(--teal); border-bottom-color: var(--teal); }

.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* Form elements */
label {
  display: block;
  font-family: var(--font-reading); font-size: 0.8rem;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--ink-light); margin-bottom: 0.4rem;
}

select, input[type="text"], input[type="email"], input[type="number"],
input[type="date"], textarea {
  width: 100%; min-height: 44px; padding: 0.6rem 0.75rem;
  font-family: var(--font-reading); font-size: 0.95rem;
  color: var(--ink); background: var(--white);
  border: 1px solid var(--parchment-2); border-radius: 2px;
  transition: border-color 0.2s;
}
select:focus, input:focus, textarea:focus {
  outline: none; border-color: var(--teal);
  box-shadow: 0 0 0 2px rgba(26,107,95,0.15);
}

textarea { min-height: 100px; resize: vertical; }

.form-group { margin-bottom: 1.5rem; }

.form-row { display: flex; gap: 1rem; }
.form-row .form-group { flex: 1; }

.char-count {
  font-family: var(--font-reading); font-size: 0.75rem;
  color: var(--stone-light); text-align: right; margin-top: 0.25rem;
}
.char-count.warn { color: #8B3A2A; }

/* Checkboxes and radios */
.check-group { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.25rem; }

.check-item {
  display: flex; align-items: center; gap: 0.5rem;
  min-height: 44px; padding: 0.4rem 0.75rem;
  background: var(--white); border: 1px solid var(--parchment-2);
  border-radius: 2px; cursor: pointer; transition: border-color 0.2s;
}
.check-item:has(input:checked) { border-color: var(--teal); background: var(--teal-light); }

.check-item input { width: 18px; height: 18px; accent-color: var(--teal); cursor: pointer; }

.check-item span {
  font-family: var(--font-reading); font-size: 0.85rem; color: var(--ink-light);
}

/* Radio group */
.radio-group { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.25rem; }

.radio-item {
  display: flex; align-items: center; gap: 0.5rem;
  min-height: 44px; padding: 0.4rem 0.75rem;
  background: var(--white); border: 1px solid var(--parchment-2);
  border-radius: 2px; cursor: pointer; transition: border-color 0.2s;
}
.radio-item:has(input:checked) { border-color: var(--teal); background: var(--teal-light); }

.radio-item input { width: 18px; height: 18px; accent-color: var(--teal); cursor: pointer; }

.radio-item span {
  font-family: var(--font-reading); font-size: 0.85rem; color: var(--ink-light);
}

/* Section divider */
.form-divider {
  height: 1px; background: var(--parchment-2); margin: 2rem 0;
}

.form-section-label {
  font-family: var(--font-display); font-size: 0.9rem;
  letter-spacing: 0.05em; color: var(--teal-dark);
  margin-bottom: 1.25rem;
}

/* Submit button */
.btn-submit {
  display: inline-flex; align-items: center; gap: 0.75rem;
  min-height: 48px; padding: 0.9rem 2.5rem;
  font-family: var(--font-display); font-size: 0.75rem;
  letter-spacing: 0.3em; text-transform: uppercase;
  color: var(--ink); background: var(--gold);
  border: none; cursor: pointer;
  transition: background 0.3s, transform 0.2s;
}
.btn-submit:hover { background: var(--gold-light); transform: translateY(-1px); }
.btn-submit:focus-visible { outline: 3px solid var(--gold-light); outline-offset: 3px; }
.btn-submit:disabled { opacity: 0.5; pointer-events: none; }

/* Status messages */
.status-msg {
  margin-top: 1rem; padding: 0.75rem 1rem;
  font-family: var(--font-reading); font-size: 0.9rem;
  border-radius: 2px; display: none;
}
.status-msg.success { display: block; background: var(--teal-light); color: var(--teal-dark); border: 1px solid rgba(26,107,95,0.3); }
.status-msg.error { display: block; background: #FEF0EE; color: #8B3A2A; border: 1px solid rgba(139,58,42,0.2); }
.status-msg.queued { display: block; background: var(--gold-light); color: var(--gold-dark); border: 1px solid rgba(196,154,46,0.3); }

/* Photo note */
.photo-note {
  margin-top: 2rem; padding: 1rem;
  background: var(--teal-light); border: 1px solid rgba(26,107,95,0.2);
  font-family: var(--font-reading); font-size: 0.85rem;
  color: var(--ink-light); line-height: 1.6;
}
.photo-note a { color: var(--teal); text-decoration: underline; }

/* Responsive */
@media (max-width: 480px) {
  .form-row { flex-direction: column; gap: 0; }
}
</style>
</head>
<body>

<header class="top-bar" role="banner">
  <div class="top-bar-left">
    <a href="map.html" class="btn-back" aria-label="Back to map">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
        <path d="M12 4L6 10l6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
    <span class="top-wordmark">The Equiano Way</span>
  </div>
</header>

<main class="page-content">
  <h1 class="page-heading">Report</h1>
  <p class="page-sub">Help us keep the route accurate and safe for all walkers</p>

  <div class="tabs" role="tablist">
    <button class="tab-btn active" role="tab" id="tab-issue" aria-controls="panel-issue" aria-selected="true">Report an Issue</button>
    <button class="tab-btn" role="tab" id="tab-brief" aria-controls="panel-brief" aria-selected="false">Walker's Brief</button>
  </div>

  <!-- Tab 1: Report an Issue -->
  <div class="tab-panel active" id="panel-issue" role="tabpanel" aria-labelledby="tab-issue">
    <form id="issueForm" novalidate>
      <div class="form-group">
        <label for="issue-category">Category</label>
        <select id="issue-category" required>
          <option value="">Select a category…</option>
          <option value="Route problem">Route problem</option>
          <option value="Gate or stile">Gate or stile</option>
          <option value="Waypoint information">Waypoint information</option>
          <option value="Story content">Story content</option>
          <option value="Safety concern">Safety concern</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <div class="form-group">
        <label for="issue-description">Description</label>
        <textarea id="issue-description" maxlength="500" required placeholder="Tell us what you found…"></textarea>
        <div class="char-count" id="issueCharCount">0 / 500</div>
      </div>

      <input type="hidden" id="issue-lat" name="lat">
      <input type="hidden" id="issue-lng" name="lng">

      <button type="submit" class="btn-submit" id="issueSubmitBtn">Submit Report</button>
      <div class="status-msg" id="issueStatus"></div>
    </form>
  </div>

  <!-- Tab 2: Walker's Brief -->
  <div class="tab-panel" id="panel-brief" role="tabpanel" aria-labelledby="tab-brief">
    <form id="briefForm" novalidate>

      <div class="form-section-label">Section Details</div>

      <div class="form-row">
        <div class="form-group">
          <label for="brief-section">Section walked</label>
          <select id="brief-section" required>
            <option value="">Loading sections…</option>
          </select>
        </div>
        <div class="form-group">
          <label for="brief-date">Date walked</label>
          <input type="date" id="brief-date" required>
        </div>
      </div>

      <div class="form-group">
        <label>Route followed exactly?</label>
        <div class="radio-group">
          <label class="radio-item"><input type="radio" name="routeExact" value="Yes" checked><span>Yes</span></label>
          <label class="radio-item"><input type="radio" name="routeExact" value="No"><span>No</span></label>
        </div>
      </div>

      <div class="form-group" id="diversionGroup" style="display:none">
        <label for="brief-diversion">Describe the diversion</label>
        <textarea id="brief-diversion" placeholder="What route did you take instead?"></textarea>
      </div>

      <div class="form-divider"></div>
      <div class="form-section-label">Route Condition</div>

      <div class="form-group">
        <label for="brief-turnings">Turnings and signage</label>
        <textarea id="brief-turnings" placeholder="Were turns clearly signed? Any missing waymarkers?"></textarea>
      </div>

      <div class="form-group">
        <label>Gate types encountered</label>
        <div class="check-group">
          <label class="check-item"><input type="checkbox" name="gates" value="Kissing gate"><span>Kissing gate</span></label>
          <label class="check-item"><input type="checkbox" name="gates" value="Swing gate"><span>Swing gate</span></label>
          <label class="check-item"><input type="checkbox" name="gates" value="Stile"><span>Stile</span></label>
          <label class="check-item"><input type="checkbox" name="gates" value="Ladder stile"><span>Ladder stile</span></label>
          <label class="check-item"><input type="checkbox" name="gates" value="Other"><span>Other</span></label>
        </div>
      </div>

      <div class="form-group">
        <label for="brief-gate-notes">Gate/stile notes</label>
        <textarea id="brief-gate-notes" placeholder="Condition, accessibility issues?"></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="brief-stile-count">Stile count</label>
          <input type="number" id="brief-stile-count" min="0" placeholder="0">
        </div>
        <div class="form-group">
          <label for="brief-stile-condition">Stile condition</label>
          <input type="text" id="brief-stile-condition" placeholder="Good / Fair / Poor">
        </div>
      </div>

      <div class="form-group">
        <label>Livestock encountered</label>
        <div class="check-group">
          <label class="check-item"><input type="checkbox" name="livestock" value="Sheep"><span>Sheep</span></label>
          <label class="check-item"><input type="checkbox" name="livestock" value="Cattle"><span>Cattle</span></label>
          <label class="check-item"><input type="checkbox" name="livestock" value="Horses"><span>Horses</span></label>
          <label class="check-item"><input type="checkbox" name="livestock" value="None"><span>None</span></label>
        </div>
      </div>

      <div class="form-group">
        <label for="brief-livestock-notes">Livestock location notes</label>
        <textarea id="brief-livestock-notes" placeholder="Which fields? Any concerns?"></textarea>
      </div>

      <div class="form-group">
        <label for="brief-poi">Points of interest</label>
        <textarea id="brief-poi" placeholder="Anything notable that future walkers should know about?"></textarea>
      </div>

      <div class="form-divider"></div>
      <div class="form-section-label">Roads &amp; Crossings</div>

      <div class="form-group">
        <label>Road sections</label>
        <div class="radio-group">
          <label class="radio-item"><input type="radio" name="roadBusy" value="Busy"><span>Busy</span></label>
          <label class="radio-item"><input type="radio" name="roadBusy" value="Quiet"><span>Quiet</span></label>
          <label class="radio-item"><input type="radio" name="roadBusy" value="N/A"><span>N/A</span></label>
        </div>
      </div>

      <div class="form-group">
        <label>Pavement available?</label>
        <div class="radio-group">
          <label class="radio-item"><input type="radio" name="pavement" value="Yes"><span>Yes</span></label>
          <label class="radio-item"><input type="radio" name="pavement" value="No"><span>No</span></label>
          <label class="radio-item"><input type="radio" name="pavement" value="Partial"><span>Partial</span></label>
        </div>
      </div>

      <div class="form-group">
        <label>Railway crossings</label>
        <div class="radio-group">
          <label class="radio-item"><input type="radio" name="railway" value="Level crossing"><span>Level crossing</span></label>
          <label class="radio-item"><input type="radio" name="railway" value="Footbridge"><span>Footbridge</span></label>
          <label class="radio-item"><input type="radio" name="railway" value="None"><span>None</span></label>
        </div>
      </div>

      <div class="form-divider"></div>
      <div class="form-section-label">Facilities</div>

      <div class="form-group">
        <label for="brief-refreshments">Refreshments</label>
        <textarea id="brief-refreshments" placeholder="Cafes, pubs, shops along the way?"></textarea>
      </div>

      <div class="form-group">
        <label for="brief-toilets">Toilets</label>
        <textarea id="brief-toilets" placeholder="Public toilets, cafe facilities?"></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="brief-accom-start">Accommodation — start</label>
          <textarea id="brief-accom-start" placeholder="Where did you stay the night before?"></textarea>
        </div>
        <div class="form-group">
          <label for="brief-accom-end">Accommodation — end</label>
          <textarea id="brief-accom-end" placeholder="Where did you stay at the end?"></textarea>
        </div>
      </div>

      <div class="form-group">
        <label for="brief-general">General notes</label>
        <textarea id="brief-general" placeholder="Anything else?"></textarea>
      </div>

      <div class="form-divider"></div>
      <div class="form-section-label">Your Details</div>

      <div class="form-row">
        <div class="form-group">
          <label for="brief-name">Name</label>
          <input type="text" id="brief-name" required placeholder="Your name">
        </div>
        <div class="form-group">
          <label for="brief-email">Email</label>
          <input type="email" id="brief-email" required placeholder="you@example.com">
        </div>
      </div>

      <div class="photo-note">
        To attach photographs, please email them separately to
        <a href="mailto:admin@equianoway.co.uk">admin@equianoway.co.uk</a>
        with your name and the section you walked.
      </div>

      <div style="margin-top:1.5rem">
        <button type="submit" class="btn-submit" id="briefSubmitBtn">Submit Walker's Brief</button>
        <div class="status-msg" id="briefStatus"></div>
      </div>
    </form>
  </div>
</main>

<script src="/js/report.js"></script>
<script>
// Tab switching
var tabBtns = document.querySelectorAll('.tab-btn');
var panels = document.querySelectorAll('.tab-panel');

tabBtns.forEach(function(btn) {
  btn.addEventListener('click', function() {
    tabBtns.forEach(function(b) { b.classList.remove('active'); b.setAttribute('aria-selected', 'false'); });
    panels.forEach(function(p) { p.classList.remove('active'); });
    btn.classList.add('active');
    btn.setAttribute('aria-selected', 'true');
    document.getElementById(btn.getAttribute('aria-controls')).classList.add('active');
  });
});

// Character count
var descEl = document.getElementById('issue-description');
var countEl = document.getElementById('issueCharCount');
descEl.addEventListener('input', function() {
  var len = descEl.value.length;
  countEl.textContent = len + ' / 500';
  countEl.classList.toggle('warn', len > 450);
});

// Diversion toggle
document.querySelectorAll('input[name="routeExact"]').forEach(function(radio) {
  radio.addEventListener('change', function() {
    document.getElementById('diversionGroup').style.display =
      document.querySelector('input[name="routeExact"]:checked').value === 'No' ? 'block' : 'none';
  });
});

// Load sections into brief form
fetch('/data/sections.json')
  .then(function(res) { return res.json(); })
  .then(function(sections) {
    var sel = document.getElementById('brief-section');
    sel.innerHTML = '<option value="">Select a section…</option>';
    sections.forEach(function(s) {
      var opt = document.createElement('option');
      opt.value = s.slug;
      opt.textContent = s.dayLabel + ' — ' + s.name;
      sel.appendChild(opt);
    });
  })
  .catch(function() {
    document.getElementById('brief-section').innerHTML = '<option value="">Sections unavailable</option>';
  });

// Issue form submit
document.getElementById('issueForm').addEventListener('submit', function(e) {
  e.preventDefault();
  var statusEl = document.getElementById('issueStatus');
  var btn = document.getElementById('issueSubmitBtn');
  var category = document.getElementById('issue-category').value;
  var description = document.getElementById('issue-description').value;

  if (!category || !description) {
    statusEl.className = 'status-msg error';
    statusEl.textContent = 'Please select a category and describe the issue.';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Sending…';
  statusEl.className = 'status-msg';
  statusEl.style.display = 'none';

  var formData = {
    type: 'Issue Report',
    category: category,
    description: description,
    lat: document.getElementById('issue-lat').value || null,
    lng: document.getElementById('issue-lng').value || null
  };

  if (!navigator.onLine) {
    EquianoReport.queueOfflineReport(formData);
    statusEl.className = 'status-msg queued';
    statusEl.textContent = 'Saved — will send when you\'re back online.';
    btn.disabled = false;
    btn.textContent = 'Submit Report';
    return;
  }

  EquianoReport.getCurrentPosition().then(function(pos) {
    if (pos) {
      formData.lat = pos.lat;
      formData.lng = pos.lng;
    }
    return EquianoReport.submitReport(formData);
  }).then(function(res) {
    if (res.ok) {
      statusEl.className = 'status-msg success';
      statusEl.textContent = res.queued
        ? 'Report saved and will be delivered shortly. Thank you.'
        : 'Report submitted successfully. Thank you.';
      document.getElementById('issueForm').reset();
      countEl.textContent = '0 / 500';
    } else {
      statusEl.className = 'status-msg error';
      statusEl.textContent = res.error || 'Something went wrong. Please try again.';
    }
  }).catch(function() {
    EquianoReport.queueOfflineReport(formData);
    statusEl.className = 'status-msg queued';
    statusEl.textContent = 'Saved — will send when you\'re back online.';
  }).finally(function() {
    btn.disabled = false;
    btn.textContent = 'Submit Report';
  });
});

// Brief form submit
document.getElementById('briefForm').addEventListener('submit', function(e) {
  e.preventDefault();
  var statusEl = document.getElementById('briefStatus');
  var btn = document.getElementById('briefSubmitBtn');
  var name = document.getElementById('brief-name').value;
  var email = document.getElementById('brief-email').value;
  var section = document.getElementById('brief-section').value;

  if (!name || !email || !section) {
    statusEl.className = 'status-msg error';
    statusEl.textContent = 'Please fill in your name, email, and the section walked.';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Sending…';
  statusEl.className = 'status-msg';
  statusEl.style.display = 'none';

  var gates = [];
  document.querySelectorAll('input[name="gates"]:checked').forEach(function(cb) { gates.push(cb.value); });

  var livestock = [];
  document.querySelectorAll('input[name="livestock"]:checked').forEach(function(cb) { livestock.push(cb.value); });

  var routeExact = document.querySelector('input[name="routeExact"]:checked');
  var roadBusy = document.querySelector('input[name="roadBusy"]:checked');
  var pavement = document.querySelector('input[name="pavement"]:checked');
  var railway = document.querySelector('input[name="railway"]:checked');

  var formData = {
    type: "Walker's Brief",
    section: section,
    dateWalked: document.getElementById('brief-date').value,
    routeExact: routeExact ? routeExact.value : '',
    diversion: document.getElementById('brief-diversion').value,
    turnings: document.getElementById('brief-turnings').value,
    gateTypes: gates,
    gateNotes: document.getElementById('brief-gate-notes').value,
    stileCount: document.getElementById('brief-stile-count').value,
    stileCondition: document.getElementById('brief-stile-condition').value,
    livestock: livestock,
    livestockNotes: document.getElementById('brief-livestock-notes').value,
    pointsOfInterest: document.getElementById('brief-poi').value,
    roadBusy: roadBusy ? roadBusy.value : '',
    pavement: pavement ? pavement.value : '',
    railway: railway ? railway.value : '',
    refreshments: document.getElementById('brief-refreshments').value,
    toilets: document.getElementById('brief-toilets').value,
    accommodationStart: document.getElementById('brief-accom-start').value,
    accommodationEnd: document.getElementById('brief-accom-end').value,
    generalNotes: document.getElementById('brief-general').value,
    submitterName: name,
    submitterEmail: email,
    description: "Walker's Brief submission for " + section
  };

  if (!navigator.onLine) {
    EquianoReport.queueOfflineReport(formData);
    statusEl.className = 'status-msg queued';
    statusEl.textContent = 'Saved — will send when you\'re back online.';
    btn.disabled = false;
    btn.textContent = 'Submit Walker\'s Brief';
    return;
  }

  EquianoReport.submitReport(formData).then(function(res) {
    if (res.ok) {
      statusEl.className = 'status-msg success';
      statusEl.textContent = res.queued
        ? 'Brief saved and will be delivered shortly. Thank you.'
        : 'Brief submitted successfully. Thank you.';
      document.getElementById('briefForm').reset();
    } else {
      statusEl.className = 'status-msg error';
      statusEl.textContent = res.error || 'Something went wrong. Please try again.';
    }
  }).catch(function() {
    EquianoReport.queueOfflineReport(formData);
    statusEl.className = 'status-msg queued';
    statusEl.textContent = 'Saved — will send when you\'re back online.';
  }).finally(function() {
    btn.disabled = false;
    btn.textContent = 'Submit Walker\'s Brief';
  });
});

// Populate location on page load
EquianoReport.getCurrentPosition().then(function(pos) {
  if (pos) {
    document.getElementById('issue-lat').value = pos.lat;
    document.getElementById('issue-lng').value = pos.lng;
  }
});
</script>
</body>
</html>
